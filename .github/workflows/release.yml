name: Release

# Build and publish desktop installers for Linux, macOS, and Windows.
# Triggers when you push a version tag (e.g. `git tag v0.1.0 && git push origin v0.1.0`),
# or manually from the Actions tab.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# Allow the action to create the GitHub Release and upload assets.
permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Apple Silicon (M1+) macOS
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
          # Intel macOS
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Linux build dependencies for Tauri / webkit2gtk.
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          # Both macOS targets are needed on the macos-latest runners.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'CollectThemAll ${{ github.ref_name }}'
          releaseBody: 'See the assets below to download and install this version.'
          # Keep the release a DRAFT while the build matrix runs so users never see
          # it with only some platforms' installers. The publish job below flips it
          # to a published, "latest" release once every platform has uploaded.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  # Once all platform builds have uploaded their installers to the draft release,
  # publish it (non-draft) and mark it as the latest release.
  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish the release as latest (non-draft)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --draft=false \
            --latest
